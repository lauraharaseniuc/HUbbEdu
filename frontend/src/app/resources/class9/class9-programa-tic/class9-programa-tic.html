<div class="lesson-container">
  <div class="lesson-header">
    <span class="lesson-subject">TIC · Clasa a IX-a</span>
    <h1>Programa școlară</h1>
  </div>

  <p class="lesson-section-label">Programa pentru toate filierele, toate profilurile, toate specializările</p>

  <div class="programa-grid">
    <div class="programa-card">
      <div class="programa-card__header">
        <div class="programa-card__icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 3h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M7 8h8M7 11h8M7 14h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="programa-card__titles">
          <h3>Tehnologia informației și a comunicațiilor</h3>
          <p>Trunchi comun (TC) · Toate filierele, toate profilurile, toate specializările</p>
        </div>
      </div>

      <div class="programa-card__actions">
        <a [href]="safeUrl" target="_blank" rel="noopener" class="programa-btn programa-btn--primary">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 1v9M4 6l4 4 4-4M2 13h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Descarcă / Deschide
        </a>
        <button class="programa-btn programa-btn--secondary" (click)="showPreview = !showPreview">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="8" cy="8" r="2.5" fill="currentColor"/>
          </svg>
          {{ showPreview ? 'Ascunde previzualizarea' : 'Previzualizează' }}
        </button>
      </div>

      @if (showPreview) {
        <div class="programa-card__preview">
          <iframe [src]="safeUrl" width="100%" height="560px" style="border: none; border-radius: 6px;"></iframe>
        </div>
      }
    </div>
  </div>
</div>
